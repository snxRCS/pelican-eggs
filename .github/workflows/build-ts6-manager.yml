name: Build TS6-Manager image

on:
  push:
    branches:
      - main
    paths:
      - 'images/ts6-manager/**'
      - '.github/workflows/build-ts6-manager.yml'
  workflow_dispatch:
    inputs:
      ts6_ref:
        description: 'clusterzx/ts6-manager ref (branch / tag / commit)'
        required: false
        default: 'main'

concurrency:
  group: build-ts6-manager-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          REPO="${{ github.repository_owner }}"
          REPO_LC="${REPO,,}"
          echo "image_lc=ghcr.io/${REPO_LC}/ts6-manager" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: images/ts6-manager
          file: images/ts6-manager/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ steps.tags.outputs.image_lc }}:latest
            ${{ steps.tags.outputs.image_lc }}:${{ steps.tags.outputs.sha_tag }}
          build-args: |
            TS6_REPO=https://github.com/clusterzx/ts6-manager.git
            TS6_REF=${{ github.event.inputs.ts6_ref || 'main' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Image built" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.tags.outputs.image_lc }}:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.tags.outputs.image_lc }}:${{ steps.tags.outputs.sha_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Pelican egg import URL:" >> "$GITHUB_STEP_SUMMARY"
          echo "\`https://raw.githubusercontent.com/${{ github.repository }}/main/voice/TS6-Manager-EGG/egg-teamspeak6-manager.json\`" >> "$GITHUB_STEP_SUMMARY"
